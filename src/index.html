<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Notes Management</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --font-outfit: "Outfit", sans-serif;
    }
  </style>
</head>
<body>
  <app-root>
    <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif;">
      <div style="width: 48px; height: 48px; border: 5px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 16px; color: #64748b; font-weight: 600; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase;">Initializing Symphony...</p>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
  </app-root>
</body>
</html>
